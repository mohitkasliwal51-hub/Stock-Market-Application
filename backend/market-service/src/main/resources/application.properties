server.port=8089
spring.application.name=MARKET-SERVICE

spring.config.import=optional:configserver:http://localhost:8090

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/stockApplication?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.profiles.active=dev

jwt.secret=${JWT_SECRET:mySuperSecureJwtSecretKeyThatIsAtLeast32BytesLong12345}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

market.timezone=Asia/Kolkata
market.open-time=09:15
market.close-time=15:30
market.max-change-per-second=5
market.max-change-per-day=20
market.simulation.tick-ms=1000
market.simulation.enabled=true
market.seed-price=100
market.holidays=2026-01-26,2026-03-14,2026-08-15,2026-10-02
