<app-navbar [state]="state"></app-navbar>
<h1>Login</h1>
<div class="container">
  <div class="text-center">
    <img src="../../../assets/login.svg" alt="Login Image">
  </div>
  <form class="form-div">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter Username" required [(ngModel)]="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Password" required [(ngModel)]="password">
      </div>
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="alert alert-success" role="alert">{{ successMessage }}</div>
      <div class="text-center">
          <button type="submit" class="btn btn-dark" (click)="onSubmit()" [disabled]="isLoading">{{ isLoading ? 'Signing in...' : 'Submit' }}</button>
          <button type="reset" class="btn btn-secondary" [disabled]="isLoading">Reset</button>
      </div>
  </form>
</div>
